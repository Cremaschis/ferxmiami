<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pago Pendiente - Fernanda Miami</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --primary: #D97348; --warning: #D97348; --text: #1f2937; --text-light: #6b7280; --border: #E0CCDC; --cream: #E8D5E8; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, var(--cream) 0%, #fff 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .container { background: #fff; border-radius: 20px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08); max-width: 500px; width: 100%; padding: 48px; text-align: center; }
    .icon { width: 80px; height: 80px; background: rgba(245, 158, 11, 0.1); border-radius: 50%; margin: 0 auto 24px; display: flex; align-items: center; justify-content: center; }
    .icon svg { width: 48px; height: 48px; color: var(--warning); stroke-width: 2.5; }
    h1 { font-size: 28px; font-weight: 700; color: var(--primary); margin-bottom: 12px; }
    p { font-size: 14px; color: var(--text-light); line-height: 1.6; margin-bottom: 24px; }
    a { display: inline-block; padding: 12px 24px; background: linear-gradient(135deg, var(--primary), #E07856); color: #fff; text-decoration: none; border-radius: 10px; font-weight: 600; transition: all 0.2s; }
    a:hover { box-shadow: 0 8px 20px rgba(26, 71, 42, 0.25); transform: translateY(-1px); }
  </style>
</head>
<body>
<div class="container">
  <div class="icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
  </div>
  <h1>Pago Pendiente</h1>
  <p>Tu pago está siendo procesado. Puede tomar unos minutos. Te notificaremos cuando se confirme.</p>
  <a href="https://fernanda-miami.vercel.app/reunion">← Volver a la reunión</a>
</div>
</body>
</html>
