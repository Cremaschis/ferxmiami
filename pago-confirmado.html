<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Confirmar pago - Fernanda Miami</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #1a472a;
      --primary-light: #2d6a4f;
      --success: #10b981;
      --text: #1f2937;
      --text-light: #6b7280;
      --border: #e5e7eb;
      --cream: #fef5e7;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, var(--cream) 0%, #fff 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
      max-width: 500px;
      width: 100%;
      padding: 48px;
    }
    h1 { font-size: 28px; font-weight: 700; color: var(--primary); margin-bottom: 8px; text-align: center; }
    .subtitle { text-align: center; color: var(--text-light); font-size: 14px; margin-bottom: 32px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.3px; }
    input { width: 100%; padding: 14px 16px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 15px; transition: all 0.2s; }
    input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26, 71, 42, 0.08); }
    input.error { border-color: #dc2626; background: rgba(239, 68, 68, 0.04); }
    .error-msg { font-size: 12px; color: #dc2626; margin-top: 6px; display: none; }
    .error-msg.show { display: block; }
    .actions { display: flex; gap: 12px; margin-top: 32px; }
    button { flex: 1; padding: 14px 24px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-confirm { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: #fff; }
    .btn-confirm:hover:not(:disabled) { box-shadow: 0 8px 20px rgba(26, 71, 42, 0.25); transform: translateY(-1px); }
    .btn-confirm:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-back { background: var(--border); color: var(--text); }
    .btn-back:hover { background: #d1d5db; }
    .success-message { display: none; text-align: center; }
    .success-message.show { display: block; }
    .success-icon { width: 80px; height: 80px; background: rgba(16, 185, 129, 0.1); border-radius: 50%; margin: 0 auto 24px; display: flex; align-items: center; justify-content: center; animation: scaleIn 0.5s ease-out; }
    .success-icon svg { width: 48px; height: 48px; color: var(--success); stroke-width: 2.5; }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    .form-section.hidden { display: none; }
    .success-message h1 { color: var(--success); margin-bottom: 12px; }
    .success-message p { color: var(--text-light); font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
    .success-message a { display: inline-block; padding: 12px 24px; background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: #fff; text-decoration: none; border-radius: 8px; font-weight: 600; }
    @media (max-width: 600px) { .container { padding: 32px 24px; } h1 { font-size: 24px; } .actions { flex-direction: column; } }
  </style>
</head>
<body>
<div class="container">
  <div class="form-section" id="formSection">
    <h1>Confirma tu pago</h1>
    <p class="subtitle">Ingresa tu email para recibir el link de Calendly</p>
    <form id="confirmForm">
      <div class="form-group">
        <label for="email">Tu email</label>
        <input type="email" id="email" placeholder="tu@email.com" autocomplete="email">
        <div class="error-msg" id="emailError"></div>
      </div>
      <div class="actions">
        <button type="button" class="btn-back" onclick="goBack()">Volver</button>
        <button type="submit" class="btn-confirm" id="submitBtn">Confirmar</button>
      </div>
    </form>
  </div>

  <div class="success-message" id="successSection">
    <div class="success-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
        <polyline points="22 4 12 14.01 9 11.01"/>
      </svg>
    </div>
    <h1>¡Pago confirmado!</h1>
    <p>Tu pago fue procesado correctamente. Te enviamos un email con el link para reservar tu horario en Calendly.</p>
    <p style="margin-bottom: 0;">Revisá tu inbox (o spam) en los próximos minutos.</p>
    <p style="margin-top: 32px;"><a href="https://fernanda-miami.vercel.app">← Volver al inicio</a></p>
  </div>
</div>

<script>
  function isValidEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  }
  function goBack() { window.history.back(); }
  function showError(msg) {
    const errorEl = document.getElementById("emailError");
    errorEl.textContent = msg;
    errorEl.classList.add("show");
    document.getElementById("email").classList.add("error");
  }
  function clearError() {
    document.getElementById("emailError").classList.remove("show");
    document.getElementById("email").classList.remove("error");
  }
  window.addEventListener("load", function() {
    const savedEmail = localStorage.getItem("mp_email");
    if (savedEmail) {
      document.getElementById("email").value = savedEmail;
    }
  });
  document.getElementById("confirmForm").addEventListener("submit", async function(e) {
    e.preventDefault();
    clearError();
    const email = document.getElementById("email").value.trim();
    if (!email || !isValidEmail(email)) {
      showError("Ingresa un email válido");
      return;
    }
    const submitBtn = document.getElementById("submitBtn");
    submitBtn.disabled = true;
    submitBtn.textContent = "Procesando...";
    try {
      const response = await fetch("https://nicocremaschi.app.n8n.cloud/webhook/pago-confirmado", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email })
      });
      if (response.ok) {
        document.getElementById("formSection").classList.add("hidden");
        document.getElementById("successSection").classList.add("show");
        localStorage.removeItem("mp_email");
        localStorage.removeItem("mp_name");
      } else {
        showError("Hubo un error. Intenta nuevamente.");
        submitBtn.disabled = false;
        submitBtn.textContent = "Confirmar";
      }
    } catch (err) {
      console.error("Error:", err);
      showError("Error de conexión. Intenta nuevamente.");
      submitBtn.disabled = false;
      submitBtn.textContent = "Confirmar";
    }
  });
  document.getElementById("email").focus();
</script>
</body>
</html>
